name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Upload Rust binary
        uses: actions/upload-artifact@v4
        with:
          name: vaultkeeper-binary
          path: target/release/vaultkeeper
          retention-days: 1

  typescript:
    name: TypeScript Build & Check (Node ${{ matrix.node-version }})
    needs: rust
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm check:typecheck

      - run: pnpm check:lint-ts

      - run: pnpm check:api-report

      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: vaultkeeper-binary
          path: target/release

      - name: Make binary executable
        run: chmod +x target/release/vaultkeeper

      - name: Test (including conformance)
        run: pnpm test
