name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rust:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Upload Rust binary
        uses: actions/upload-artifact@v4
        with:
          name: vaultkeeper-binary
          path: target/release/vaultkeeper
          retention-days: 1

  ci:
    name: Build & Check (Node ${{ matrix.node-version }})
    needs: rust
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm check:typecheck

      - run: pnpm check:lint-ts

      - run: pnpm check:api-report

      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: vaultkeeper-binary
          path: target/release

      - name: Make binary executable
        run: chmod +x target/release/vaultkeeper

      - name: Test (including conformance)
        run: pnpm test

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: [rust, ci]
    runs-on: ubuntu-latest
    environment: crates-publish
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify crate packaging
        run: |
          cargo package -p vaultkeeper-core --no-verify
          cargo package -p vaultkeeper-cli --no-verify

      - name: Publish vaultkeeper-core
        run: |
          set +e
          OUTPUT=$(cargo publish -p vaultkeeper-core --no-verify 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            case "$OUTPUT" in
              *"already uploaded"*)
                echo "vaultkeeper-core: already published, skipping."
                ;;
              *)
                echo "vaultkeeper-core: publish failed."
                exit $STATUS
                ;;
            esac
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Publish vaultkeeper-cli (with retry for index propagation)
        run: |
          attempts=0
          max_attempts=6
          delay=15
          while [ "$attempts" -lt "$max_attempts" ]; do
            attempts=$((attempts + 1))
            echo "Attempt ${attempts}/${max_attempts}..."
            set +e
            OUTPUT=$(cargo publish -p vaultkeeper-cli --no-verify 2>&1)
            STATUS=$?
            set -e
            echo "$OUTPUT"
            if [ $STATUS -eq 0 ]; then
              echo "vaultkeeper-cli published successfully."
              exit 0
            fi
            case "$OUTPUT" in
              *"already uploaded"*)
                echo "vaultkeeper-cli: already published, skipping."
                exit 0
                ;;
            esac
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "Failed to publish vaultkeeper-cli after ${max_attempts} attempts."
              exit $STATUS
            fi
            echo "Retrying in ${delay}s..."
            sleep "$delay"
            delay=$((delay * 2))
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
